socket-io-client = { group = "io.socket", name = "socket.io-client", version.ref="socketIOClient" }
lottie-compose = { group = "com.airbnb.android", name = "lottie-compose", version.ref="lottieCompose" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
android-library = { id = "com.android.library", version.ref = "agp" }
google-service = { id = "com.google.gms.google-services", version.ref = "googleService" }
firebase-crashlytics = { id = "com.google.firebase.crashlytics" , version = "3.0.3"}

