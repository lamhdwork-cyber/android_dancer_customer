compressor = { module = "id.zelory:compressor", version.ref = "compressor" }
google-places = { module = "com.google.android.libraries.places:places", version.ref = "places" }
firebase-bom = { group = "com.google.firebase", name = "firebase-bom", version.ref = "firebseBom" }
firebase-analytics = { group = "com.google.firebase", name = "firebase-analytics" }
