retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofitConvertGson = { module = "com.squareup.retrofit2:converter-gson", version.ref = "retrofit" }
okhttp3 = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp3" }
okhttp3LoggingInterceptor = { module = "com.squareup.okhttp3:logging-interceptor", version.ref = "okhttp3" }
coroutinesCore = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "croutineCore" }
google-accompanist-systemuicontroller = { module = "com.google.accompanist:accompanist-systemuicontroller", version.ref = "gooogleSystemuicontroller" }
material-icons-extended = { module = "androidx.compose.material:material-icons-extended", version.ref = "materialIconExtend" }
io-coil = { module = "io.coil-kt:coil-compose", version.ref = "coil" }
fishbun = { module = "io.github.sangcomz:fishbun", version.ref = "fishbun" }
